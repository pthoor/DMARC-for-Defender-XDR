id: a1c2d3e4-f5a6-4b7c-8d9e-0f1a2b3c4d5e
name: DMARC - High-Volume Authentication Failures (Spoofing Indicator)
description: |
  Detects high-volume DMARC authentication failures from a single source IP targeting protected domains.
  This may indicate a spoofing or phishing campaign impersonating your domain.
  Tune the FailedMessages threshold based on your environment's volume.
severity: Medium
requiredDataConnectors:
  - connectorId: CustomLogsAma
    dataTypes:
      - DMARCReports_CL
queryFrequency: PT1H
queryPeriod: PT1H
triggerOperator: gt
triggerThreshold: 0
status: Available
tactics:
  - InitialAccess
relevantTechniques:
  - T1566
  - T1001
query: |
  DMARCReports_CL
  | where TimeGenerated > ago(1h)
  | extend MessageCountSafe = tolong(coalesce(MessageCount, 0))
  | extend DmarcPassEffective = coalesce(
      tobool(column_ifexists('DmarcPass', bool(null))),
      tolower(tostring(column_ifexists('PolicyEvaluated_dkim', ''))) == 'pass'
      or tolower(tostring(column_ifexists('PolicyEvaluated_spf', ''))) == 'pass'
    )
  | where DmarcPassEffective == false
  | summarize
      FailedMessages = sum(MessageCountSafe),
      Domains = make_set(Domain, 10),
      HeaderFroms = make_set(HeaderFrom, 10),
      SampleDomain = anyif(Domain, isnotempty(Domain)),
      SampleHeaderFrom = anyif(HeaderFrom, isnotempty(HeaderFrom))
      by SourceIP
  | where isnotempty(SourceIP)
  | where FailedMessages >= 50
entityMappings:
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: SourceIP
  - entityType: DNS
    fieldMappings:
      - identifier: DomainName
        columnName: SampleDomain
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: SampleHeaderFrom
version: 1.1.0
kind: Scheduled
