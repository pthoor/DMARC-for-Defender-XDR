name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pester-tests:
    name: Pester Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Pester Tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Output.Verbosity = 'Detailed'
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config

  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Force -ErrorAction Stop
          $results = @()
          $results += Invoke-ScriptAnalyzer -Path ./src -Recurse -Severity Error
          $results += Invoke-ScriptAnalyzer -Path ./scripts -Recurse -Severity Error
          if ($results.Count -gt 0) {
            $results | Format-Table -AutoSize
            throw "PSScriptAnalyzer found $($results.Count) error(s)."
          }
          Write-Host "No PSScriptAnalyzer errors found."
          Write-Host "Checking warnings (non-blocking)..."
          $warnings = @()
          $warnings += Invoke-ScriptAnalyzer -Path ./src -Recurse -Severity Warning
          $warnings += Invoke-ScriptAnalyzer -Path ./scripts -Recurse -Severity Warning
          if ($warnings.Count -gt 0) {
            Write-Warning "PSScriptAnalyzer found $($warnings.Count) warning(s) - not blocking CI."
            $warnings | Format-Table -AutoSize
          }

  bicep-validate:
    name: Bicep Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Bicep syntax check
        run: az bicep build --file infra/main.bicep --stdout > /dev/null

      - name: Bicep lint
        run: az bicep lint --file infra/main.bicep

  credential-scan:
    name: Credential Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@v3.90.5
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --results=verified,unknown --fail
