name: Release Guard

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-guard:
    name: Version and Query Guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run release guard tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = @(
            './tests/Versioning.Tests.ps1',
            './tests/QueryParity.Tests.ps1'
          )
          $config.Output.Verbosity = 'Detailed'
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config
