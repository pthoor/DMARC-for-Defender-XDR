name: "🐛 Bug Report"
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Deploy with parameters '...'
        2. Send a DMARC report email '...'
        3. Observe '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: deployment-method
    attributes:
      label: Deployment Method
      description: How did you deploy? (e.g., Azure CLI, Bicep, GitHub Actions)
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      render: shell
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      render: markdown
    validations:
      required: false
